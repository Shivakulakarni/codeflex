services:
  - type: web
    name: codeflex-ai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_CONVEX_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CONVEX_DEPLOY_KEY
        sync: false
      - key: NEXT_PUBLIC_VAPI_ASSISTANT_ID
        sync: false
      - key: VAPI_API_KEY
        sync: false
